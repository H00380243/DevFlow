# Alembic configuration for DemandFlow (Feature F002).
# The sqlalchemy.url is left empty on purpose; alembic/env.py reads DATABASE_URL
# from the environment (falls back to app.core.config.Settings default).

[alembic]
script_location = alembic
# url is left empty intentionally; env.py reads DATABASE_URL env var (or app Settings)
sqlalchemy.url =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
